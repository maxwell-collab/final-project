<!DOCTYPE html>

    <title>Nike Media</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        /* NAVBAR */
        .navbar {
            background: black;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        .navbar a:hover {
            color: red;
        }

        /* MEDIA GRID */
        .media-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .box {
            width: 300px;
            background: #222;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px black;
        }

        img, iframe {
            width: 100%;
            border-radius: 10px;
        }

        /* FOOTER */
        footer {
            background: black;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
