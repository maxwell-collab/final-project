<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike Media</title>
    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
        }
        .media-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .box {
            width: 30%;
            background: #222;
            padding: 10px;
            border-radius: 10px;
        }
        img, iframe {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>Nike Shoes Gallery</h1>

<div class="media-container">

    <!-- ✅ REAL NIKE SHOE IMAGES -->
    <div class="box">
        <img src="https://static.nike.com/a/images/c_limit,w_592,f_auto/t_product_v1/air-max-270-mens-shoes-KkLcGR.png" alt="Nike Air Max">
    </div>

    <div class="box">
        <img src="https://static.nike.com/a/images/c_limit,w_592,f_auto/t_product_v1/air-force-1-07-mens-shoes-5QFp5Z.png" alt="Nike Air Force 1">
    </div>

    <div class="box">
        <img src="https://static.nike.com/a/images/c_limit,w_592,f_auto/t_product_v1/revolution-6-next-nature-road-running-shoes-NC0P7k.png" alt="Nike Running Shoes">
    </div>

    <div class="box">
        <img src="https://static.nike.com/a/images/c_limit,w_592,f_auto/t_product_v1/jordan-1-mid-shoes-SQf7DM.png" alt="Nike Jordan">
    </div>

    <div class="box">
        <img src="https://static.nike.com/a/images/c_limit,w_592,f_auto/t_product_v1/pegasus-40-road-running-shoes-extra-wide-lRmJ9F.png" alt="Nike Pegasus">
    </div>

    <!-- ✅ WORKING YOUTUBE VIDEOS -->
    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/IDxNI0j9lR8"
            title="Nike Commercial"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/Fq2CvmgoO7I"
            title="Nike Ad"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/0yO7xLAGugQ"
            title="Nike Shoes Video"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/1hHMwLxN6EM"
            title="Nike Running"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/2hM4wHc6q9k"
            title="Nike Sports"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

</div>

</body>
</html>
