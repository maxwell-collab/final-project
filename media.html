<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike Media</title>
    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
        }
        .media-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .box {
            width: 300px;
            background: #222;
            padding: 10px;
            border-radius: 10px;
        }
        img, iframe {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>Nike Shoes Gallery</h1>

<div class="media-container">

    <!-- ✅ WORKING SHOE IMAGES (UNSPLASH - SAFE) -->
    <div class="box">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="Nike Shoe">
    </div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Nike Shoe">
    </div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1528701800489-20be3c2ea4b4" alt="Nike Shoe">
    </div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Nike Shoe">
    </div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1584735175315-9d5df23be620" alt="Nike Shoe">
    </div>

    <!-- ✅ WORKING VIDEOS (EMBED SAFE) -->
    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/Fq2CvmgoO7I"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/IDxNI0j9lR8"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/1hHMwLxN6EM"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/0yO7xLAGugQ"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/Fn7NLWHJw4s"
            allowfullscreen>
        </iframe>
    </div>

</div>

</body>
</html>
