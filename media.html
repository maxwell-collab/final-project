<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery | SoleSearcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SoleSearcher</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="media.html">Media</a></li>
        </ul>
    </nav>

    <main class="container">
        <h1>Our Media Gallery</h1>
        
        <div class="media-grid">
            <div class="media-container">
                <img src="shoe-run.jpg" alt="Running Shoes" class="responsive-img">
                <p>Performance in Motion</p>
            </div>

            <div class="media-container">
                <video controls width="100%">
                    <source src="commercial1.mp4" type="video/mp4">
                </video>
                <p>Summer Collection Teaser</p>
            </div>

            <div class="media-container">
                <img src="shoe-detail.jpg" alt="Leather Detail" class="responsive-img">
                <p>Hand-stitched Quality</p>
            </div>

            <div class="media-container">
                <video controls width="100%">
                    <source src="unboxing.mp4" type="video/mp4">
                </video>
                <p>Unboxing the 'Cloud-Walk'</p>
            </div>
            
            </div>
    </main>

    <footer>
        <p>&copy; 2024 SoleSearcher Shoe Store.</p>
    </footer>
