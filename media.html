<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike Media</title>
    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
        }
        .media-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .box {
            width: 30%;
            background: #222;
            padding: 10px;
            border-radius: 10px;
        }
        img, iframe, video {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>Nike Shoes Gallery</h1>

<div class="media-container">

    <!-- ✅ IMAGES (ONLINE - ALWAYS WORK) -->
    <div class="box">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Nike Air Max">
    </div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Nike Running">
    </div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="Nike Sneakers">
    </div>

    <!-- ✅ OPTION 1: YOUTUBE VIDEOS (RECOMMENDED) -->
    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/2QjPzG4H4v8"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/0VjZz0rR7hM"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <div class="box">
        <iframe height="200"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <!-- ✅ OPTION 2: LOCAL VIDEOS (USE IF YOU HAVE FILES) -->
    <!-- Put your videos in a folder called "videos" -->

    <div class="box">
        <video controls>
            <source src="videos/nike1.mp4" type="video/mp4">
            Your browser does not support video.
        </video>
    </div>

    <div class="box">
        <video controls>
            <source src="videos/nike2.mp4" type="video/mp4">
            Your browser does not support video.
        </video>
    </div>

    <div class="box">
        <video controls>
            <source src="videos/nike3.mp4" type="video/mp4">
            Your browser does not support video.
        </video>
    </div>

</div>

</body>
</html>
