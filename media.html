<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike Media</title>
    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
        }
        .media-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .box {
            width: 30%;
            background: #222;
            padding: 10px;
            border-radius: 10px;
        }
        img, video {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>Nike Shoes Gallery</h1>

<div class="media-container">

    <!-- Images -->
    <div class="box">
        <img src="https://via.placeholder.com/300x200" alt="Nike Air Max">
    </div>

    <div class="box">
        <img src="https://via.placeholder.com/300x200" alt="Nike Jordan">
    </div>

    <div class="box">
        <img src="https://via.placeholder.com/300x200" alt="Nike Running">
    </div>

    <!-- Videos -->
    <div class="box">
        <video controls>
            <source src="video1.mp4" type="video/mp4">
        </video>
    </div>

    <div class="box">
        <video controls>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="box">
        <video controls>
            <source src="video3.mp4" type="video/mp4">
        </video>
    </div>

</div>

</body>
</html>
