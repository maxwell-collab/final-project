<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike Services</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .service-box {
            background: white;
            padding: 15px;
            width: 30%;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>Nike Shoe Services</h1>

<div class="container">

    <div class="service-box">
        <h2>Customization</h2>
        <img src="https://via.placeholder.com/300x200" alt="Nike Custom">
        <p>Design your own Nike shoes with custom colors and styles.</p>
    </div>

    <div class="service-box">
        <h2>Fast Delivery</h2>
        <img src="https://via.placeholder.com/300x200" alt="Delivery">
        <p>Get your Nike shoes delivered quickly and safely.</p>
    </div>

    <div class="service-box">
        <h2>Repair Services</h2>
        <img src="https://via.placeholder.com/300x200" alt="Repair">
        <p>We repair worn-out Nike shoes and restore them.</p>
    </div>

</div>

</body>
</html>
